apiVersion: v1
kind: ConfigMap
metadata:
  name: cloud-setup-templates
  namespace: dcm
data:
  keycloak-redirect-uris.yaml: |
    - "https://oauth-openshift.{{ OPENSHIFT_APPS_DOMAIN }}/oauth2callback/Keycloak"
    - "https://{{ SITE_HOST_NAME }}/callback"
    - "https://{{ SITE_HOST_NAME }}/logout"
    - "http://localhost:{{ SITE_PORT }}/callback"
    - "http://localhost:{{ SITE_PORT }}/logout"
  oauthclient.yaml: |
    kind: OAuthClient
    apiVersion: oauth.openshift.io/v1
    metadata:
      name: keycloak
    secret: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters') }}"
    redirectURIs:
      - '{{ AUTH_URL }}/realms/{{ AUTH_REALM }}/broker/openshift/endpoint'
    grantMethod: prompt
  openshift-group-sync-secret.yaml: |
    apiVersion: v1
    kind: Secret
    metadata:
      namespace: group-sync-operator
      name: openshift-group-sync
    type: Opaque
    stringData:
      username: "{{ AUTH_ADMIN_USERNAME }}"
      password: "{{ AUTH_ADMIN_PASSWORD }}"
  groupsync.yaml: |
    apiVersion: redhatcop.redhat.io/v1alpha1
    kind: GroupSync
    metadata:
      name: github
      namespace: group-sync-operator
    spec:
      schedule: "*/10 * * * *"
      providers:
        - name: keycloak
          keycloak:
            realm: {{ AUTH_REALM }}
            credentialsSecret:
              name: openshift-group-sync
              namespace: group-sync-operator
            url: {{ AUTH_URL }}
  zookeeper-secret.yaml: |
    apiVersion: v1
    kind: Secret
    metadata:
      name: cloud-zookeeper
      namespace: {{ SITE_NAMESPACE }}
    type: Opaque
    stringData:
      ZOOKEEPER_NAMESPACE: "{{ ZOOKEEPER_NAMESPACE }}"
      ZOOKEEPER_HOST_NAME: "{{ ZOOKEEPER_HOST_NAME }}"
      ZOOKEEPER_PORT: "{{ ZOOKEEPER_PORT }}"
      ZOOKEEPER_MAX_RETRIES: "{{ ZOOKEEPER_MAX_RETRIES }}"
      ZOOKEEPER_BASE_SLEEP_TIME_MILLIS: "{{ ZOOKEEPER_BASE_SLEEP_TIME_MILLIS }}"
      ZOOKEEPER_MAX_SLEEP_MILLIS: "{{ ZOOKEEPER_MAX_SLEEP_MILLIS }}"
      ZOOKEEPER_CONNECTION_TIMEOUT_MILLIS: "{{ ZOOKEEPER_CONNECTION_TIMEOUT_MILLIS }}"
      ZOOKEEPER_SESSION_TIMEOUT_MILLIS: "{{ ZOOKEEPER_SESSION_TIMEOUT_MILLIS }}"
  solr-secret.yaml: |
    apiVersion: v1
    kind: Secret
    metadata:
      name: cloud-solr
      namespace: {{ SITE_NAMESPACE }}
    type: Opaque
    stringData:
      SOLR_ID: "{{ SOLR_ID }}"
      SOLR_NAMESPACE: "{{ SOLR_NAMESPACE }}"
      SOLR_SSL: "{{ SOLR_SSL }}"
      SOLR_HOST_NAME: "{{ SOLR_HOST_NAME }}"
      SOLR_PORT: "{{ SOLR_PORT }}"
      SOLR_COLLECTION: "{{ SOLR_COLLECTION }}"
      SOLR_URL: "{{ SOLR_URL }}"
      SOLR_POD_NAME: "{{ SOLR_POD_NAME }}"
      SOLR_WORKER_COMMIT_WITHIN_MILLIS: "{{ SOLR_WORKER_COMMIT_WITHIN_MILLIS }}"
      SOLR_CONFIGSET: "{{ SOLR_CONFIGSET }}"
      SOLR_USERNAME: "{{ SOLR_USERNAME }}"
      SOLR_PASSWORD: "{{ SOLR_PASSWORD }}"
      SOLR_SSL_COMPUTATE: "{{ SOLR_SSL_COMPUTATE }}"
      SOLR_HOST_NAME_COMPUTATE: "{{ SOLR_HOST_NAME_COMPUTATE }}"
      SOLR_PORT_COMPUTATE: "{{ SOLR_PORT_COMPUTATE }}"
      SOLR_COLLECTION_COMPUTATE: "{{ SOLR_COLLECTION_COMPUTATE }}"
      SOLR_URL_COMPUTATE: "{{ SOLR_URL_COMPUTATE }}"
  database-secret.yaml: |
    apiVersion: v1
    kind: Secret
    metadata:
      name: cloud-database
      namespace: {{ SITE_NAMESPACE }}
    type: Opaque
    stringData:
      DATABASE_DATABASE: "{{ DATABASE_DATABASE }}"
