apiVersion: redhatcop.redhat.io/v1alpha1
kind: RandomSecret
metadata:
  name: postgres-pguser-dcm
  namespace: dcm
spec:
  authentication: 
    path: kubernetes
    role: secret-writer
  connection:
    address: 'http://vault.vault.svc.cluster.local:8200'
  path: dcm/kv
  secretKey: DATABASE_PASSWORD
  secretFormat:
    passwordPolicyName: special-characters-password-policy-15
